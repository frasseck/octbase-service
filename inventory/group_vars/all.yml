# Platform-wide defaults for all Octbase client instances.
# Per-client values live in ledger/clients/<name>.yml — not here.

# Public base domain; a client "acme" is served at acme.ocete.ch.
base_domain: ocete.ch

# Path ON THE ADMIN MACHINE to a checkout of the app repo
# (frasseck/octbase.git) at the release you want to deploy. The create
# playbook rsyncs this working tree AS-IS to the client account — make sure
# it is on the released commit with a clean `git status` before rolling out.
octbase_src: "{{ lookup('env', 'HOME') }}/dev.ocete.ch"

# The app repo, and the git-based deploy source used by sync-instance.yml
# (as opposed to create-instance.yml's octbase_src working-tree rsync).
# sync-instance clones/updates octbase_branch into octbase_git_cache ON THE
# ADMIN MACHINE, then rsyncs that tree to the client — the production host
# never talks to GitHub. Override the branch per run: -e octbase_branch=...
octbase_repo: "git@github.com:frasseck/octbase.git"
octbase_branch: main
octbase_git_cache: "{{ lookup('env', 'HOME') }}/.cache/octbase-service/octbase"

# Default OCTBASE_APP_VERSION stamp when a ledger entry has no app_version.
# Keep in step with the latest release entry in the app repo's CHANGELOG.md.
octbase_version: "1.0.4"

# SMTP relay for outgoing app mail (invitations, notifications). Leaving the
# host empty makes the API log mail to stdout — set a real relay before
# onboarding production clients. Put the password in an Ansible Vault file
# rather than in plain text here.
smtp_host: ""
smtp_port: 587
smtp_from: noreply@beyags.com
smtp_user: ""
smtp_pass: ""

# CIDRs whose X-Forwarded-For the API honors (the stack's own frontend Caddy
# plus the edge proxy). 10.89.0.0/16 is the default rootless-podman network
# range — verify with `podman network inspect octbase_default` in a client
# account and tighten if needed.
octbase_trusted_proxies: "10.89.0.0/16"

# GDPR retention windows (days) applied to every client stack.
audit_retention_days: 365
activity_retention_days: 365

# ── Monitoring ────────────────────────────────────────────
# Mail recipient for state-change alerts ("" disables mail; state changes are
# always logged to the journal). Requires a working sendmail on the host.
alert_email: ""
# Also probe https://<name>.<base_domain>/health through the public edge
# (global default; a client whose DNS/edge is still pending can opt out via
# monitor_edge_probe: false in its ledger file).
edge_probe: true

# ── Conventions (rarely changed) ──────────────────────────
# Linux account prefix; client "acme" runs as user "oct-acme".
client_user_prefix: "oct-"
# Where the app source + .env + data live inside the client account.
client_app_subdir: octbase
# Host-side registries maintained by the playbooks.
edge_snippet_dir: /etc/octbase/edge
clients_registry_dir: /etc/octbase/clients.d
backup_dir: /var/backups/octbase
# The root-managed edge reverse proxy's config. Only migrate-instance.yml
# edits it (snippet import + retiring a moved domain's hardcoded vhost);
# everything else just generates snippets for it.
edge_caddyfile: /etc/caddy/Caddyfile
