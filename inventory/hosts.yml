# The production host(s) that run client stacks. One entry per server; a
# client's ledger entry pins it to one of these names via its `host:` field
# (default: default_client_host in group_vars). Adjust ansible_host to the
# real server address (the playbooks are run from a local admin machine and
# connect over SSH).
#
# Adding a server = add it here, run install-monitoring.yml and
# install-backup.yml (they target all hosts), set up its root edge Caddy with
# the `import /etc/octbase/edge/*.caddy` line — then place clients on it via
# `host:` in their ledger entries (docs/fleet-concept.md).
#
# No ansible_user here on purpose: connect as whatever local/SSH-config user
# your plain `ssh ocete.ch` already resolves to (root login over SSH is
# refused on this host) and let `become: true` (set at each play) elevate via
# sudo. Override per-run instead of hardcoding a name here, e.g.:
#   ansible-playbook ... -e ansible_user=<you> --ask-become-pass
# (or configure passwordless sudo for that account on the host).
octbase_hosts:
  hosts:
    prod:
      ansible_host: ocete.ch
    # prod2:
    #   ansible_host: prod2.ocete.ch
