# The production host that runs all client stacks.
# Adjust ansible_host to the real server address (the playbooks are run from
# a local admin machine and connect over SSH).
#
# No ansible_user here on purpose: connect as whatever local/SSH-config user
# your plain `ssh ocete.ch` already resolves to (root login over SSH is
# refused on this host) and let `become: true` (set at each play) elevate via
# sudo. Override per-run instead of hardcoding a name here, e.g.:
#   ansible-playbook ... -e ansible_user=<you> --ask-become-pass
# (or configure passwordless sudo for that account on the host).
octbase_hosts:
  hosts:
    prod:
      ansible_host: ocete.ch
