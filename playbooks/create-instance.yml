---
# Create — or update — one Octbase client instance from its ledger entry.
#
#   ansible-playbook playbooks/create-instance.yml -e client=acme
#
# Idempotent: on an existing instance it re-syncs the app source, re-applies
# the ledger-managed settings (edition, add-on, seats, version) and restarts
# the stack only if something changed. Secrets and data are never touched
# after the first run.
- name: Create / update Octbase client instance
  hosts: octbase_hosts
  become: true
  vars:
    linux_user: "{{ client_user_prefix }}{{ client }}"
    home_dir: "/home/{{ linux_user }}"
    app_dir: "{{ home_dir }}/{{ client_app_subdir }}"
    fqdn: "{{ client }}.{{ base_domain }}"
    admin_email: "admin@{{ client }}.{{ base_domain }}"

  pre_tasks:
    - name: Load client ledger entry
      ansible.builtin.include_vars:
        file: "../ledger/clients/{{ client }}.yml"
        name: client_ledger
      register: client_ledger_loaded

    - name: Normalize client ledger variable
      ansible.builtin.set_fact:
        client_ledger: "{{ client_ledger_loaded.ansible_facts.client_ledger }}"

    - name: Validate ledger entry
      ansible.builtin.assert:
        that:
          - client is defined
          - client_ledger.name == client
          - client_ledger.name is match('^[a-z][a-z0-9-]{1,27}$')
          - client_ledger.name not in ['www', 'dev', 'mail', 'api', 'octbase', 'admin']
          - client_ledger.edition | lower in ['team', 'business', 'enterprise']
          - not ((client_ledger.jira_import | default(false)) and client_ledger.edition | lower == 'team')
          - client_ledger.max_users | int >= 1
          - client_ledger.ports.frontend is defined and client_ledger.ports.api is defined and client_ledger.ports.postgres is defined
          - client_ledger.status == 'active'
        fail_msg: >-
          Ledger entry for '{{ client | default('?') }}' is invalid or not
          'active' — run ./ledger/ledger.py validate.

    # ── Host scoping: the instance lives on exactly one inventory host ──
    - name: Client host must exist in the inventory
      ansible.builtin.assert:
        that: (client_ledger.host | default(default_client_host)) in groups['octbase_hosts']
        fail_msg: >-
          Ledger host '{{ client_ledger.host | default(default_client_host) }}'
          is not in inventory/hosts.yml — fix the ledger entry (or the inventory).

    - name: Scope the play to the client's host
      ansible.builtin.meta: end_host
      when: inventory_hostname != (client_ledger.host | default(default_client_host))

    # Generated on the admin machine; only used the first time the .env is
    # written (the template task below never overwrites an existing file).
    - name: Generate initial secrets
      ansible.builtin.set_fact:
        gen_jwt_secret: "{{ lookup('pipe', 'openssl rand -base64 32') }}"
        gen_scm_key: "{{ lookup('pipe', 'openssl rand -base64 32') }}"
        gen_mfa_key: "{{ lookup('pipe', 'openssl rand -base64 32') }}"
        gen_pg_password: "{{ lookup('pipe', 'openssl rand -hex 16') }}"
      no_log: true

  tasks:
    - name: Create client Linux account
      ansible.builtin.user:
        name: "{{ linux_user }}"
        comment: "Octbase client {{ client_ledger.display_name | default(client) }}"
        shell: /bin/bash
        create_home: true
      register: client_account

    - name: Set client account facts
      ansible.builtin.set_fact:
        client_uid: "{{ client_account.uid }}"
        user_env:
          XDG_RUNTIME_DIR: "/run/user/{{ client_account.uid }}"
          DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ client_account.uid }}/bus"

    # Linger keeps the user's systemd instance (and thus the stack) running
    # without a login session, and starts it at boot.
    - name: Enable systemd linger
      ansible.builtin.command: loginctl enable-linger {{ linux_user }}
      args:
        creates: /var/lib/systemd/linger/{{ linux_user }}

    - name: Restrict home directory
      ansible.builtin.file:
        path: "{{ home_dir }}"
        mode: "0750"

    # ── Account-level resource caps (docs/fleet-concept.md §2) ──
    - name: Set resource / disk-quota facts
      ansible.builtin.set_fact:
        client_resources: "{{ client_default_resources | combine(client_ledger.resources | default({})) }}"
        client_disk_quota_gb: "{{ client_ledger.disk_quota_gb | default(default_disk_quota_gb) }}"

    - name: Ensure the user-slice drop-in directory exists
      ansible.builtin.file:
        path: "/etc/systemd/system/user-{{ client_uid }}.slice.d"
        state: directory
        mode: "0755"

    - name: Apply account resource caps (systemd user-slice drop-in)
      ansible.builtin.template:
        src: user-slice.j2
        dest: "/etc/systemd/system/user-{{ client_uid }}.slice.d/99-octbase.conf"
        mode: "0644"
      register: slice_dropin

    - name: Reload systemd to apply the slice caps
      ansible.builtin.systemd_service:
        daemon_reload: true
      when: slice_dropin.changed

    # ── Disk quota: enforce where the filesystem can, monitor always ──
    - name: Find the filesystem holding the client home
      ansible.builtin.command:
        cmd: df --output=target {{ home_dir }}
      register: home_mount
      changed_when: false

    - name: Apply the filesystem user quota (soft 90% / hard 100%)
      ansible.builtin.command:
        cmd: >-
          setquota -u {{ linux_user }}
          {{ ((client_disk_quota_gb | int) * 1024 * 1024 * 0.9) | int }}
          {{ (client_disk_quota_gb | int) * 1024 * 1024 }}
          0 0 {{ home_mount.stdout_lines | last | trim }}
      register: quota_set
      changed_when: quota_set.rc == 0
      failed_when: false

    - name: Warn when the filesystem cannot enforce the quota
      ansible.builtin.debug:
        msg: >-
          Filesystem user quota NOT enforced for {{ linux_user }}
          (setquota failed: {{ quota_set.stderr | default('') | trim | default('not available', true) }}).
          Usage is still monitored and alerts at {{ disk_alert_pct }}% of
          {{ client_disk_quota_gb }} GB — enable usrquota on
          {{ home_mount.stdout_lines | last | trim }} to enforce
          (docs/fleet-concept.md §3).
      when: quota_set.rc != 0

    - name: Sync application source from admin machine
      ansible.posix.synchronize:
        src: "{{ octbase_src }}/"
        dest: "{{ app_dir }}/"
        archive: true
        delete: false
        # The synchronize action plugin auto-adds a --rsync-path=sudo rsync
        # itself whenever `become` is set and this parameter is empty (root
        # is otherwise unwritable/unchownable to a non-root ansible_user).
        # Setting it explicitly here (rather than via rsync_opts) prevents
        # the plugin from also injecting its own, which produced a duplicate
        # --rsync-path on the command line and broke sudo's arg parsing.
        rsync_path: "sudo rsync"
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=.env"
          - "--exclude=pgdata*"
          - "--exclude=attachments"
          - "--exclude=.pytest_cache"
          - "--exclude=node_modules"
          # Internal development prompts — not part of the product.
          - "--exclude=/prompts"
          - "--chown={{ linux_user }}:{{ linux_user }}"
      notify: Restart stack
      when: octbase_src_remote is not defined

    - name: Sync application source from source checkout on target host
      ansible.builtin.command:
        cmd: >-
          rsync -a
          --exclude=.git
          --exclude=.env
          --exclude=pgdata*
          --exclude=attachments
          --exclude=.pytest_cache
          --exclude=node_modules
          --exclude=/prompts
          --chown={{ linux_user }}:{{ linux_user }}
          {{ octbase_src_remote }}/
          {{ app_dir }}/
      notify: Restart stack
      when: octbase_src_remote is defined

    - name: Install production compose override
      ansible.builtin.copy:
        src: podman-compose.client.yml
        dest: "{{ app_dir }}/podman-compose.client.yml"
        owner: "{{ linux_user }}"
        group: "{{ linux_user }}"
        mode: "0644"
      notify: Restart stack

    - name: Create attachments directory
      ansible.builtin.file:
        path: "{{ app_dir }}/attachments"
        state: directory
        owner: "{{ linux_user }}"
        group: "{{ linux_user }}"
        mode: "0700"

    # ── Initial administrator (first deploy only) ──────────────────────────
    # A fresh instance has an empty users table and no way in: the app has no
    # public signup and no first-run flow, its user API refuses to assign
    # SUPER_ADMIN, and an invited user always lands as USER. So env.j2 hands
    # the app a first SUPER_ADMIN, which it creates at startup while the users
    # table is still empty (app: internal/bootstrap) and ignores forever after.
    #
    # The gate is "does the .env already exist", not "does the instance have
    # users": env.j2 is written with force:false, so an existing .env is never
    # rewritten and its bootstrap keys — already consumed — stay as they are.
    # That also keeps this ahead of the stack ever starting, which a live
    # database query could not be.
    - name: Check whether this client already has an .env
      ansible.builtin.stat:
        path: "{{ app_dir }}/.env"
      register: client_env

    - name: Set the first-admin fact
      ansible.builtin.set_fact:
        needs_admin: "{{ not client_env.stat.exists }}"

    # The bootstrap keys env.j2 writes are inert on an app build that predates
    # internal/bootstrap: the instance would come up with no admin, and this
    # play would still print a password that could never log in. Refuse instead
    # — a source tree that cannot honour the .env is a rollout ordering
    # mistake, not a client problem. Checks the synced tree, which is what the
    # image is built from two tasks below.
    - name: The synced app source must support the admin bootstrap
      ansible.builtin.stat:
        path: "{{ app_dir }}/octbase-api/internal/bootstrap/bootstrap.go"
      register: app_bootstrap_pkg
      when: needs_admin | bool

    - name: App source must be new enough to create the first admin
      ansible.builtin.assert:
        that: app_bootstrap_pkg.stat.exists
        fail_msg: >-
          The app source in {{ app_dir }} has no internal/bootstrap package, so
          it would ignore the OCTBASE_BOOTSTRAP_ADMIN_* keys and come up with no
          way to log in. Point octbase_src at a release that includes the admin
          bootstrap and re-run.
      when: needs_admin | bool

    # 24 chars from [A-Za-z0-9]: clears the app's 12-char minimum and its
    # common-password blocklist (app: internal/shared/password.go). Generated
    # on the admin machine like the secrets in the pre_tasks above — but unlike
    # those, the plaintext is never written anywhere. It is printed once at the
    # end of this play; only its bcrypt hash reaches the .env and the database.
    - name: Generate the initial admin password
      ansible.builtin.set_fact:
        gen_admin_password: "{{ lookup('password', '/dev/null length=24 chars=ascii_letters,digits') }}"
      no_log: true
      when: needs_admin | bool

    - name: Check for the bcrypt module on the admin machine
      delegate_to: localhost
      become: false
      ansible.builtin.command:
        argv: [python3, -c, "import bcrypt"]
      register: bcrypt_probe
      changed_when: false
      failed_when: false
      when: needs_admin | bool

    - name: The admin machine must be able to hash the password
      ansible.builtin.assert:
        that: bcrypt_probe.rc == 0
        fail_msg: >-
          python3 -c 'import bcrypt' failed on the admin machine — install it
          (apt install python3-bcrypt, or pip install bcrypt) and re-run.
          It is needed on a client's FIRST deploy only, to hash the initial
          admin password for {{ fqdn }}.
      when: needs_admin | bool

    # Cost 12 matches the app's own hashes. python3's bcrypt emits $2b$ where
    # the app emits $2a$; the Go bcrypt the API verifies with checks only the
    # major version, so a $2b$ hash logs in normally.
    - name: Hash the initial admin password
      delegate_to: localhost
      become: false
      ansible.builtin.command:
        argv:
          - python3
          - -c
          - |
            import bcrypt, sys
            sys.stdout.write(bcrypt.hashpw(sys.argv[1].encode(), bcrypt.gensalt(12)).decode())
          - "{{ gen_admin_password }}"
      register: admin_hash
      changed_when: false
      no_log: true
      when: needs_admin | bool

    - name: Set the initial admin hash for the .env template
      ansible.builtin.set_fact:
        gen_admin_password_hash: "{{ admin_hash.stdout | trim }}"
      no_log: true
      when: needs_admin | bool

    - name: Write .env (first deploy only — holds the generated secrets)
      ansible.builtin.template:
        src: env.j2
        dest: "{{ app_dir }}/.env"
        owner: "{{ linux_user }}"
        group: "{{ linux_user }}"
        mode: "0600"
        force: false
      no_log: true

    - name: Sync ledger-managed settings into .env
      ansible.builtin.lineinfile:
        path: "{{ app_dir }}/.env"
        regexp: "^{{ item.key }}="
        line: "{{ item.key }}={{ item.value }}"
      loop:
        - { key: OCTBASE_EDITION, value: "{{ client_ledger.edition | upper }}" }
        - { key: OCTBASE_OPTION_JIRA_IMPORT, value: "{{ 'true' if (client_ledger.jira_import | default(false)) else 'false' }}" }
        - { key: OCTBASE_MAX_USERS, value: "{{ client_ledger.max_users }}" }
        - { key: OCTBASE_APP_VERSION, value: "{{ client_ledger.app_version | default(octbase_version) }}" }
      notify: Restart stack

    # The port block was historically written once by env.j2 and never
    # re-synced, so an app-repo change to a port MAPPING could not reach an
    # existing client: the stack then failed to start with an invalid port
    # format and the .env had to be hand-fixed (D20 on postgres/API across
    # v1.0.7, D22 on the frontend across v18 — same bug, three ports). These
    # four keys carry no secrets and are pure ledger/platform facts, so they
    # are re-applied like the blocks above. FRONTEND_BIND_ADDR is not
    # cosmetic: the compose default is 0.0.0.0 (right for a standalone stack,
    # which is its own public entry), and a client frontend must stay on
    # loopback behind the edge proxy — that is C9.
    - name: Sync port bindings into .env
      ansible.builtin.lineinfile:
        path: "{{ app_dir }}/.env"
        regexp: "^{{ item.key }}="
        line: "{{ item.key }}={{ item.value }}"
      loop:
        - { key: FRONTEND_BIND_ADDR, value: "127.0.0.1" }
        - { key: FRONTEND_PORT, value: "{{ client_ledger.ports.frontend }}" }
        - { key: API_PORT, value: "{{ client_ledger.ports.api }}" }
        - { key: POSTGRES_PORT, value: "{{ client_ledger.ports.postgres }}" }
      notify: Restart stack

    # Platform-wide values from group_vars would otherwise only ever reach a
    # client on its FIRST deploy (the .env template is never overwritten) —
    # changing e.g. the SMTP relay must propagate to existing clients too.
    - name: Sync platform-managed settings into .env
      ansible.builtin.lineinfile:
        path: "{{ app_dir }}/.env"
        regexp: "^{{ item.key }}="
        line: "{{ item.key }}={{ item.value }}"
      loop:
        - { key: OCTBASE_TRUSTED_PROXIES, value: "{{ octbase_trusted_proxies }}" }
        - { key: OCTBASE_SMTP_HOST, value: "{{ smtp_host }}" }
        - { key: OCTBASE_SMTP_PORT, value: "{{ smtp_port }}" }
        - { key: OCTBASE_SMTP_FROM, value: "{{ smtp_from }}" }
        - { key: OCTBASE_SMTP_USER, value: "{{ smtp_user }}" }
        - { key: OCTBASE_AUDIT_RETENTION_DAYS, value: "{{ audit_retention_days }}" }
        - { key: OCTBASE_ACTIVITY_RETENTION_DAYS, value: "{{ activity_retention_days }}" }
      notify: Restart stack

    - name: Sync SMTP password into .env
      ansible.builtin.lineinfile:
        path: "{{ app_dir }}/.env"
        regexp: "^OCTBASE_SMTP_PASS="
        line: "OCTBASE_SMTP_PASS={{ smtp_pass }}"
      no_log: true
      notify: Restart stack

    - name: Build container images (first run takes several minutes)
      become_user: "{{ linux_user }}"
      environment: "{{ user_env }}"
      ansible.builtin.command:
        cmd: podman-compose -f podman-compose.yml -f podman-compose.client.yml build
        chdir: "{{ app_dir }}"
      changed_when: false
      timeout: 3600

    - name: Ensure systemd user dir exists
      ansible.builtin.file:
        path: "{{ home_dir }}/.config/systemd/user"
        state: directory
        owner: "{{ linux_user }}"
        group: "{{ linux_user }}"
        mode: "0755"

    - name: Install systemd user unit
      ansible.builtin.template:
        src: octbase.service.j2
        dest: "{{ home_dir }}/.config/systemd/user/octbase.service"
        owner: "{{ linux_user }}"
        group: "{{ linux_user }}"
        mode: "0644"
      notify: Restart stack

    - name: Enable and start the stack
      become_user: "{{ linux_user }}"
      environment: "{{ user_env }}"
      ansible.builtin.systemd_service:
        name: octbase
        scope: user
        daemon_reload: true
        enabled: true
        state: started

    - name: Flush handlers (apply pending restart before health check)
      ansible.builtin.meta: flush_handlers

    - name: Wait for API health
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ client_ledger.ports.api }}/health"
        status_code: 200
      register: health
      retries: 30
      delay: 5
      until: health.status == 200

    - name: Ensure registry/edge dirs exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ clients_registry_dir }}"
        - "{{ edge_snippet_dir }}"

    - name: Register client for monitoring
      ansible.builtin.template:
        src: client-registry.conf.j2
        dest: "{{ clients_registry_dir }}/{{ client }}.conf"
        mode: "0644"

    - name: Write edge proxy vhost snippet
      ansible.builtin.template:
        src: caddy-vhost.j2
        dest: "{{ edge_snippet_dir }}/{{ client }}.caddy"
        mode: "0644"

    - name: Manual follow-up steps
      ansible.builtin.debug:
        msg:
          - "Instance {{ fqdn }} is up (API /health 200 on 127.0.0.1:{{ client_ledger.ports.api }})."
          - "1) DNS (manual): create A/AAAA record {{ fqdn }} -> this host."
          - "2) Edge proxy: snippet written to {{ edge_snippet_dir }}/{{ client }}.caddy —"
          - "   ensure the edge Caddyfile has 'import {{ edge_snippet_dir }}/*.caddy', then reload it."
          - "3) Verify: curl -s https://{{ fqdn }}/health"
          - "4) First login: see the admin credentials printed below (first deploy only)."

    # Last task in the play, deliberately: this is the only time the password
    # is ever shown. It is not recoverable afterwards — only the bcrypt hash
    # is stored. If it is lost, delete the admin row and re-run this playbook
    # to mint a new one.
    - name: Initial admin credentials — store these now
      ansible.builtin.debug:
        msg:
          - "Initial SUPER_ADMIN for {{ fqdn }} — shown once, not recoverable:"
          - "  login:    {{ admin_email }}"
          - "  password: {{ gen_admin_password }}"
          - "Hand these to the client over a secure channel (not email), and have"
          - "them change the password after first login."
      when: needs_admin | bool

  handlers:
    - name: Restart stack
      become_user: "{{ linux_user }}"
      environment: "{{ user_env }}"
      ansible.builtin.systemd_service:
        name: octbase
        scope: user
        daemon_reload: true
        state: restarted
