---
# Set OCTBASE_MAX_USERS for one client and restart its stack.
#
# The value comes from the ledger (edit max_users there, commit, then run):
#   ansible-playbook playbooks/set-max-users.yml -e client=acme
#
# An extra-var overrides the ledger for ad-hoc changes (update the ledger
# afterwards — it must stay the source of truth):
#   ansible-playbook playbooks/set-max-users.yml -e client=acme -e max_users=40
- name: Set OCTBASE_MAX_USERS
  hosts: octbase_hosts
  become: true
  vars:
    linux_user: "{{ client_user_prefix }}{{ client }}"
    app_dir: "/home/{{ linux_user }}/{{ client_app_subdir }}"

  pre_tasks:
    - name: Load client ledger entry
      ansible.builtin.include_vars:
        file: "../ledger/clients/{{ client }}.yml"
        name: client_ledger
      register: client_ledger_loaded

    - name: Normalize client ledger variable
      ansible.builtin.set_fact:
        client_ledger: "{{ client_ledger_loaded.ansible_facts.client_ledger }}"

    - name: Resolve effective max_users
      ansible.builtin.set_fact:
        effective_max_users: "{{ (max_users if (max_users is defined) else client_ledger.max_users) | int }}"

    - name: Validate
      ansible.builtin.assert:
        that:
          - client is defined
          - client_ledger.name == client
          - effective_max_users | int >= 1
        fail_msg: "max_users must be a positive integer"

    - name: Scope the play to the client's host
      ansible.builtin.meta: end_host
      when: inventory_hostname != (host | default(default_client_host))

  tasks:
    - name: Look up the client account
      ansible.builtin.getent:
        database: passwd
        key: "{{ linux_user }}"

    - name: Set user session env
      ansible.builtin.set_fact:
        user_env:
          XDG_RUNTIME_DIR: "/run/user/{{ ansible_facts['getent_passwd'][linux_user][1] }}"
          DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ ansible_facts['getent_passwd'][linux_user][1] }}/bus"

    - name: Update OCTBASE_MAX_USERS in .env
      ansible.builtin.lineinfile:
        path: "{{ app_dir }}/.env"
        regexp: "^OCTBASE_MAX_USERS="
        line: "OCTBASE_MAX_USERS={{ effective_max_users }}"
      register: envchange

    # Don't trust the file edit alone: if a previous run died between the
    # .env change and the restart, the file already matches but the container
    # still runs the old value. Ask the running API container instead.
    - name: Read OCTBASE_MAX_USERS from the running API container
      become_user: "{{ linux_user }}"
      environment: "{{ user_env }}"
      ansible.builtin.shell: >
        podman exec
        "$(podman ps -q --filter label=com.docker.compose.service=octbase-api | head -n1)"
        printenv OCTBASE_MAX_USERS
      register: running_max_users
      changed_when: false
      failed_when: false

    # Restart (down+up) recreates the containers so the env change actually
    # reaches the API — a plain container restart would keep the old env.
    # Also restarts when the container is unreadable/down (rc != 0): the
    # health check below then verifies the stack came back.
    - name: Restart the stack
      become_user: "{{ linux_user }}"
      environment: "{{ user_env }}"
      ansible.builtin.systemd_service:
        name: octbase
        scope: user
        state: restarted
      when: >-
        envchange.changed
        or running_max_users.rc != 0
        or (running_max_users.stdout | trim) != (effective_max_users | string)
      register: restart

    - name: Wait for API health
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ client_ledger.ports.api }}/health"
        status_code: 200
      register: health
      retries: 30
      delay: 5
      until: health.status == 200

    - name: Result
      ansible.builtin.debug:
        msg: >-
          {{ client }}: OCTBASE_MAX_USERS={{ effective_max_users }}
          ({{ 'stack restarted' if restart is not skipped else 'value already live in the container — no restart' }}).
          If you overrode the ledger with -e max_users, update
          ledger/clients/{{ client }}.yml now and commit.
