---
# Offboard a client instance — DESTRUCTIVE. Requires an explicit confirmation:
#
#   ansible-playbook playbooks/remove-instance.yml -e client=acme -e confirm=acme
#
# Takes a final backup (pg_dump + attachments + .env) to {{ backup_dir }},
# then deletes the Linux account with all its data and deregisters the client
# from monitoring and the edge. Pass -e skip_backup=true to skip the backup
# (e.g. when the stack is already broken beyond a dump).
#
# Afterwards, manually: remove the DNS record, reload the edge proxy, and set
# status: removed in the ledger file (keep the file as the historical record).
- name: Remove Octbase client instance
  hosts: octbase_hosts
  become: true
  vars:
    linux_user: "{{ client_user_prefix }}{{ client }}"
    home_dir: "/home/{{ linux_user }}"
    app_dir: "{{ home_dir }}/{{ client_app_subdir }}"
    fqdn: "{{ client }}.{{ base_domain }}"
    ts: "{{ ansible_facts['date_time']['iso8601_basic_short'] }}"

  pre_tasks:
    - name: Load client ledger entry
      ansible.builtin.include_vars:
        file: "../ledger/clients/{{ client }}.yml"
        name: client_ledger
      register: client_ledger_loaded

    - name: Normalize client ledger variable
      ansible.builtin.set_fact:
        client_ledger: "{{ client_ledger_loaded.ansible_facts.client_ledger }}"

    - name: Require explicit confirmation
      ansible.builtin.assert:
        that:
          - client is defined
          - confirm is defined
          - confirm == client
        fail_msg: "Refusing: pass -e confirm={{ client | default('<name>') }} to really remove this client."

    - name: Scope the play to the client's host
      ansible.builtin.meta: end_host
      when: inventory_hostname != (client_ledger.host | default(default_client_host))

  tasks:
    # First, so a monitor run during the teardown window doesn't fire a
    # spurious DOWN alert for a client we are deliberately removing. (If the
    # play aborts later, e.g. on a failed backup, re-run create-instance.yml
    # or this play to restore/finish — until then the client is unmonitored.)
    - name: Deregister from monitoring
      ansible.builtin.file:
        path: "{{ clients_registry_dir }}/{{ client }}.conf"
        state: absent

    - name: Check whether the account exists
      ansible.builtin.getent:
        database: passwd
        key: "{{ linux_user }}"
      register: account
      failed_when: false

    - name: Account-scoped teardown
      when: account.ansible_facts is defined
      vars:
        client_uid: "{{ account.ansible_facts.getent_passwd[linux_user][1] }}"
        user_env:
          XDG_RUNTIME_DIR: "/run/user/{{ account.ansible_facts.getent_passwd[linux_user][1] }}"
          DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ account.ansible_facts.getent_passwd[linux_user][1] }}/bus"
      block:
        - name: Ensure backup directory exists
          ansible.builtin.file:
            path: "{{ backup_dir }}"
            state: directory
            mode: "0700"
          when: not (skip_backup | default(false) | bool)

        # pipefail is essential: without it the pipeline's exit code is gzip's,
        # and a dead postgres container would yield an empty "successful"
        # backup right before the account (and the only data copy) is deleted.
        - name: Final database backup
          ansible.builtin.shell: |
            set -euo pipefail
            sudo -u {{ linux_user }} XDG_RUNTIME_DIR=/run/user/{{ client_uid }} \
              podman exec octbase_postgres_1 pg_dump -U octbase octbase \
              | gzip > {{ backup_dir }}/{{ client }}-db-{{ ts }}.sql.gz
          args:
            executable: /bin/bash
            # inherited cwd is the connecting admin account's home (root SSH
            # is refused); sudo -u {{ linux_user }} won't run if that dir
            # isn't reachable by the target user.
            chdir: /tmp
          when: not (skip_backup | default(false) | bool)

        - name: Verify database backup is a complete dump
          ansible.builtin.shell: |
            set -euo pipefail
            gunzip -t {{ backup_dir }}/{{ client }}-db-{{ ts }}.sql.gz
            gunzip -c {{ backup_dir }}/{{ client }}-db-{{ ts }}.sql.gz \
              | tail -n 20 | grep -q 'PostgreSQL database dump complete'
          args:
            executable: /bin/bash
          changed_when: false
          when: not (skip_backup | default(false) | bool)

        - name: Final files backup (attachments + .env)
          ansible.builtin.shell: |
            set -euo pipefail
            tar czf {{ backup_dir }}/{{ client }}-files-{{ ts }}.tar.gz \
              -C {{ home_dir }} {{ client_app_subdir }}/attachments {{ client_app_subdir }}/.env
          args:
            executable: /bin/bash
          when: not (skip_backup | default(false) | bool)

        - name: Stop and disable the stack
          become_user: "{{ linux_user }}"
          environment: "{{ user_env }}"
          ansible.builtin.systemd_service:
            name: octbase
            scope: user
            enabled: false
            state: stopped
          failed_when: false

        - name: Disable linger
          ansible.builtin.command: loginctl disable-linger {{ linux_user }}
          failed_when: false

        - name: Terminate remaining user processes
          ansible.builtin.command: loginctl terminate-user {{ linux_user }}
          failed_when: false

        - name: Delete the account and all its data
          ansible.builtin.user:
            name: "{{ linux_user }}"
            state: absent
            remove: true
            force: true
          register: userdel
          retries: 3
          delay: 5
          until: userdel is succeeded

        - name: Remove the account's resource-cap slice drop-in
          ansible.builtin.file:
            path: "/etc/systemd/system/user-{{ client_uid }}.slice.d"
            state: absent

    - name: Remove edge vhost snippet
      ansible.builtin.file:
        path: "{{ edge_snippet_dir }}/{{ client }}.caddy"
        state: absent

    - name: Manual follow-up steps
      ansible.builtin.debug:
        msg:
          - "Client {{ client }} removed{{ '' if (skip_backup | default(false) | bool) else '; final backup in ' + backup_dir }}."
          - "1) DNS (manual): delete the {{ fqdn }} record."
          - "2) Edge proxy: reload it (its {{ client }}.caddy snippet is gone)."
          - "3) Ledger: set status: removed in ledger/clients/{{ client }}.yml and commit."
